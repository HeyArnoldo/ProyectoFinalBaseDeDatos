services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    mem_limit: 96m
    environment:
      SERVICE_FQDN_WEB_80: "${SERVICE_FQDN_WEB_80:-https://restaurante.cloud.groowtech.com}"
    expose:
      - "80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 12
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    mem_limit: 384m
    environment:
      API_PORT: "3000"
      MONGODB_URI: mongodb://mongodb:27017/?replicaSet=rs0
      MONGODB_DATABASE: restaurant
      CASSANDRA_CONTACT_POINTS: cassandra
      CASSANDRA_LOCAL_DATACENTER: datacenter1
      CASSANDRA_PORT: "9042"
      OPERATOR_USERNAME: "${OPERATOR_USERNAME:?OPERATOR_USERNAME is required}"
      OPERATOR_PASSWORD_HASH_B64: "${OPERATOR_PASSWORD_HASH_B64:?OPERATOR_PASSWORD_HASH_B64 is required}"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required}"
    depends_on:
      mongodb:
        condition: service_healthy
      cassandra:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 12
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
  mongodb:
    image: mongo:8.0
    hostname: mongodb
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--wiredTigerCacheSizeGB", "0.5"]
    mem_limit: 1536m
    volumes:
      - mongodb_data:/data/db
      - ./infra/mongodb/healthcheck.js:/healthcheck.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://127.0.0.1:27017/admin", "/healthcheck.js"]
      interval: 5s
      timeout: 5s
      start_period: 10s
      retries: 30
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
  cassandra:
    image: cassandra:5.0
    environment:
      CASSANDRA_CLUSTER_NAME: restaurant-projection
      CASSANDRA_NUM_TOKENS: "16"
      MAX_HEAP_SIZE: 1536M
      HEAP_NEWSIZE: 512M
    mem_limit: 3072m
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          cqlsh --request-timeout 5 127.0.0.1 9042
          -e "SELECT release_version FROM system.local;"
          >/dev/null 2>&1
      interval: 10s
      timeout: 10s
      start_period: 60s
      retries: 30
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
volumes:
  mongodb_data:
  cassandra_data:
